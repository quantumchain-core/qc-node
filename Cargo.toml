[package]
name = "qc-node"
version = "0.1.0"
edition = "2021"

[dependencies]
pqcrypto-dilithium = "0.5"
pqcrypto-traits = "0.3"
sha3 = "0.10"
libp2p = { version = "0.53", features = ["gossipsub", "tcp", "noise", "yamux", "macros"] }
tokio = { version = "1.35", features = ["full"] }
futures = "0.3"
