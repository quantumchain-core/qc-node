[package]
name = "qc-node"
version = "0.1.1-m3"
edition = "2021"

[[bin]]
name = "qc-node"
path = "src/main.rs"

[dependencies]
libp2p = { version = "0.53", features = ["tcp", "noise", "yamux", "mdns", "gossipsub"] }
tokio = { version = "1.0", features = ["full"] }
log = "0.4"
env_logger = "0.11"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
hex = "0.4"

# FIXED: Correct feature name is pqcrypto-dilithium, not dilithium3
pqcrypto = { version = "0.17", default-features = false, features = ["pqcrypto-dilithium", "serialization"] }
pqcrypto-traits = "0.3"
