[package]
name = "qc-node"
version = "0.1.0"
edition = "2021"

[dependencies]
pqcrypto-dilithium = "0.5"
pqcrypto-traits = "0.3"
sha3 = "0.10"

libp2p = { version = "0.53", features = ["gossipsub", "tcp", "noise", "yamux", "tokio", "macros"] }
tokio = { version = "1.35", features = ["full"] }
futures = "0.3"
bincode = "1.3"
serde = { version = "1.0", features = ["derive"] }

[dev-dependencies]
tokio = { version = "1.35", features = ["macros", "rt-multi-thread"] }

[patch.crates-io]
libp2p = { version = "0.53.0" }
libp2p-swarm = { version = "0.53.0" }
libp2p-gossipsub = { version = "0.46.1" }
libp2p-identity = { version = "0.2.7" }
