[package]
name = "qc-node"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"
pqcrypto-dilithium = "0.5"
pqcrypto-traits = "0.3"
sha3 = "0.10"
sha2 = "0.10" # ADD THIS - used for state_root hashing

# M2: libp2p with macros for #[derive(NetworkBehaviour)]
libp2p = { version = "0.53.0", features = ["gossipsub", "tcp", "noise", "yamux", "tokio", "macros"] }

tokio = { version = "1.35", features = ["full"] }
futures = "0.3"

# M6: State execution + storage
thiserror = "1.0" # ADD THIS - error handling in executor.rs
sled = "0.34" # ADD THIS - disk storage for blocks/state

[dev-dependencies]
tokio = { version = "1.35", features = ["macros", "rt-multi-thread"] }
