[package]
name = "qc-node"
version = "0.1.0-alpha"
edition = "2021"
authors = ["Touqeer Ahmad <you@example.com>"]
description = "Mobile-first L1 node for qtc-rampura-testnet-0"
license = "MIT"
repository = "https://github.com/quantumchain-core/qc-node"

[dependencies]
pqcrypto-dilithium = "0.17"
pqcrypto-traits = "0.3"
sha3 = "0.10"
libp2p = { version = "0.53", features = ["tcp", "noise", "yamux"] }
tokio = { version = "1", features = ["full"] }
rocksdb = "0.22"
serde = { version = "1.0", features = ["derive"] }

[lib]
name = "qc_node"
path = "src/lib.rs"

[[bin]]
name = "qc-node"
path = "src/main.rs"