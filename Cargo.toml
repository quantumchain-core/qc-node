[package]
name = "qc-node"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"
pqcrypto-dilithium = "0.5"
pqcrypto-traits = "0.3"
sha3 = "0.10"

# M2: libp2p with macros for #[derive(NetworkBehaviour)]
libp2p = { version = "0.53.0", features = ["gossipsub", "tcp", "noise", "yamux", "tokio", "macros"] }

tokio = { version = "1.35", features = ["full"] }
futures = "0.3"

[dev-dependencies]
tokio = { version = "1.35", features = ["macros", "rt-multi-thread"] }
