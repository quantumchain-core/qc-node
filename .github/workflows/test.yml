name: Test M1+M2+M3+M4+M5
on: [push, pull_request]

jobs:
  test_m1_m2_m3:
    name: Test M1 M2 M3
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install C toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
      - uses: dtolnay/rust-toolchain@stable
      - name: Force libp2p 0.53
        run: cargo update -p libp2p --precise 0.53.0
      - name: Verify libp2p version
        run: cargo tree -i libp2p | grep libp2p
      - name: Test M1 Crypto
        run: cargo test crypto::m1_tests --verbose
      - name: Test M2 Network
        run: cargo test net::m2_tests --verbose
      - name: Test M3 Chain
        run: cargo test chain::m3_tests --verbose

  test_m4_mempool:
    name: Test M4 Mempool
    runs-on: ubuntu-22.04
    needs: test_m1_m2_m3
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test M4 Mempool
        run: cargo test mempool::tests --verbose

  test_m5_consensus:
    name: Test M5 Consensus
    runs-on: ubuntu-22.04
    needs: test_m4_mempool
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test M5 Consensus
        run: cargo test consensus::tests --verbose
