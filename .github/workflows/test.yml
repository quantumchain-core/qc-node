name: test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-22.04 # Critical: 22.04 has right clang
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install C toolchain for pqcrypto
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang cmake pkg-config libssl-dev
        clang --version
        cmake --version
        
    - name: Install Rust
      uses: dtolnay/rust-toolchain@1.75.0 # Pin Rust version - pqcrypto tested on this
      
    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
    - name: Build
      run: cargo build --verbose
      env:
        RUSTFLAGS: "-C target-feature=+crt-static" # Force static linking
        
    - name: Test
      run: cargo test --verbose
