name: Test M1+M2+M3
on: [push]

jobs:
  test_m1_m2_m3:
    name: Test M1 M2 M3
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install C toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
      - uses: dtolnay/rust-toolchain@stable
      - name: Force libp2p 0.53
        run: cargo update -p libp2p --precise 0.53.0
      - name: Verify libp2p version
        run: cargo tree -i libp2p | grep libp2p
      - name: Test M1 Crypto
        run: cargo test crypto::m1_tests --verbose
      - name: Test M2 Network
        run: cargo test net::m2_tests --verbose
      - name: Test M3 Chain
        run: cargo test chain::m3_tests --verbose
