name: M1 Tests
on: [push]
jobs:
  m1:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install C toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
      - uses: dtolnay/rust-toolchain@stable
      - name: Test M1
        run: cargo test crypto::m1_tests --verbose
